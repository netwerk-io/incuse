name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
          cache: true
      - run: make build

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
          cache: true
      - run: make test

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
          cache: true
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4

  # Single required status check. Passes when every job is success or
  # skipped, so branch protection only needs to watch this name.
  ci:
    name: CI
    runs-on: ubuntu-latest
    needs: [build, test, lint]
    if: always()
    steps:
      - name: Check results
        run: |
          for r in "${{ needs.build.result }}" "${{ needs.test.result }}" "${{ needs.lint.result }}"; do
            if [[ "$r" != "success" && "$r" != "skipped" ]]; then
              echo "Job failed or cancelled: $r"
              exit 1
            fi
          done
          echo "All checks passed or skipped."
