name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
          cache: true

      - name: Build linux/amd64
        env:
          VERSION: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
        run: |
          mkdir -p dist
          GOOS=linux GOARCH=amd64 go build -trimpath \
            -ldflags "-s -w -X main.version=${VERSION} -X main.commit=${COMMIT:0:7}" \
            -o dist/incuse-${VERSION}-linux-amd64 ./cmd/incuse

      - name: Stage deployment artefacts
        run: |
          cp deploy/systemd/incuse.service dist/incuse.service
          cp deploy/systemd/incuse.example.yaml dist/incuse.example.yaml
          cp deploy/systemd/install.sh dist/install.sh

      - name: Generate sha256 sums
        working-directory: dist
        run: |
          sha256sum incuse-* incuse.service incuse.example.yaml install.sh > SHA256SUMS

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/incuse-${{ github.ref_name }}-linux-amd64
            dist/incuse.service
            dist/incuse.example.yaml
            dist/install.sh
            dist/SHA256SUMS
          generate_release_notes: true
